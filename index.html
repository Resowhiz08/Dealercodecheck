<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dealer Search</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>Dealer Search</h1>

<input
type="text"
id="search"
placeholder="Search Dealer Code or Dealer Name">

<!-- Progress Loader -->
<div id="loadingBox">

    <div class="progress">

        <div id="progressBar"></div>

    </div>

    <p id="progressText">Loading... 0%</p>

</div>

<!-- Table -->
<table id="dealerTable" style="display:none;">

<thead>

<tr>
<th>Dealer Code</th>
<th>Dealer Name</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
